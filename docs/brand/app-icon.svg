    Lungful App Icon
    Deep stone background with bone breath ring centered.
    Apple applies the squircle mask at export time.
    Ring fills ~60% of the icon area (diameter ~614px).
    Geometry scaled from 100x100 breath-ring.svg: multiply all coords by 10.24, center at 512,512.

    Scale factor: icon center = 512. Ring was centered at 50 in 100-unit space.
    New center: 512. Scale: 614/76 = 8.079 (76 = outer diameter in 100-unit space).
    Actually: outer radius in original = 38, so diameter = 76.
    Target diameter = 614 (60% of 1024). Scale = 614/76 = 8.079.
    Offset: center goes from 50 to 512, so shift = 512 - 50*8.079 = 512 - 403.95 = 108.05.
    New coords: x_new = x_old * 8.079 + 108.05, y_new = y_old * 8.079 + 108.05.

    Precomputed points below.
  -->

